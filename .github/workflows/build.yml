name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_bundle:
        description: '快速模式：只產生 EXE，跳過安裝包'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust (with Windows SDK)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Tauri EXE (快速模式)
        if: ${{ github.event.inputs.skip_bundle == 'true' }}
        run: npm run tauri build -- --no-bundle

      - name: Build Tauri EXE (完整模式)
        if: ${{ github.event.inputs.skip_bundle != 'true' }}
        run: npm run tauri build

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WisdomBoard-Portable
          path: src-tauri/target/release/wisdomboard.exe
