<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>框選區域</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100vw; height: 100vh; overflow: hidden; }
      body {
        background: #000;
        cursor: crosshair;
        user-select: none;
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      }
      #bg {
        position: fixed; inset: 0;
        background-size: cover;
        background-position: center;
        filter: brightness(0.5);
      }
      #hint {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: #fff; font-size: 20px;
        text-align: center; pointer-events: none;
        z-index: 5; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      }
      #hint small { display: block; font-size: 13px; opacity: 0.6; margin-top: 8px; }
      #sel {
        position: fixed;
        border: 2px solid #89b4fa;
        background: rgba(137,180,250,0.15);
        display: none;
        pointer-events: none;
        z-index: 10;
      }
      #sz {
        position: fixed;
        background: rgba(0,0,0,0.8); color: #89b4fa;
        padding: 3px 8px;
        font-size: 11px; font-family: monospace;
        display: none; pointer-events: none; z-index: 20;
      }
      #dbg {
        position: fixed; bottom: 10px; left: 10px;
        color: #ff0; font-size: 11px; z-index: 30;
        text-shadow: 0 1px 2px #000;
      }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div id="hint">正在載入螢幕截圖...<small>按 ESC 取消</small></div>
    <div id="sel"></div>
    <div id="sz"></div>
    <div id="dbg"></div>
    <script>
      (function() {
        var bg = document.getElementById("bg");
        var hint = document.getElementById("hint");
        var sel = document.getElementById("sel");
        var sz = document.getElementById("sz");
        var dbg = document.getElementById("dbg");
        var dragging = false, sx = 0, sy = 0;
        var ready = false;

        function log(msg) {
          dbg.textContent = msg;
          console.log("[overlay] " + msg);
        }

        // 等待 Rust 注入 __SCREENSHOT_PATH__
        function waitForPath() {
          if (window.__SCREENSHOT_PATH__) {
            loadScreenshot(window.__SCREENSHOT_PATH__);
          } else {
            setTimeout(waitForPath, 100);
          }
        }

        function loadScreenshot(filePath) {
          log("截圖路徑: " + filePath);
          // 使用 Tauri 的 convertFileSrc 將本地路徑轉為 webview 可存取的 URL
          if (window.__TAURI__ && window.__TAURI__.core.convertFileSrc) {
            var assetUrl = window.__TAURI__.core.convertFileSrc(filePath);
            log("asset URL: " + assetUrl);
            var img = new Image();
            img.onload = function() {
              bg.style.backgroundImage = "url(" + assetUrl + ")";
              hint.innerHTML = "拖拉滑鼠框選要擷取的區域<small>按 ESC 取消</small>";
              ready = true;
              log("截圖載入成功 (" + img.width + "x" + img.height + ")");
            };
            img.onerror = function() {
              log("convertFileSrc 載入失敗，嘗試 file:// 協議");
              tryFileProtocol(filePath);
            };
            img.src = assetUrl;
          } else {
            log("convertFileSrc 不可用，嘗試 file:// 協議");
            tryFileProtocol(filePath);
          }
        }

        function tryFileProtocol(filePath) {
          var fileUrl = "file:///" + filePath.replace(/\\/g, "/");
          log("file URL: " + fileUrl);
          var img = new Image();
          img.onload = function() {
            bg.style.backgroundImage = "url(" + fileUrl + ")";
            hint.innerHTML = "拖拉滑鼠框選要擷取的區域<small>按 ESC 取消</small>";
            ready = true;
            log("file:// 載入成功");
          };
          img.onerror = function() {
            log("file:// 也失敗，嘗試直接用 invoke 讀取");
            tryInvokeRead(filePath);
          };
          img.src = fileUrl;
        }

        function tryInvokeRead(filePath) {
          // 最後手段：用 fetch + blob
          fetch("file:///" + filePath.replace(/\\/g, "/"))
            .then(function(r) { return r.blob(); })
            .then(function(blob) {
              var url = URL.createObjectURL(blob);
              bg.style.backgroundImage = "url(" + url + ")";
              hint.innerHTML = "拖拉滑鼠框選要擷取的區域<small>按 ESC 取消</small>";
              ready = true;
              log("fetch blob 載入成功");
            })
            .catch(function(err) {
              hint.innerHTML = "截圖載入失敗<small>按 ESC 取消</small>";
              log("全部方式失敗: " + err);
            });
        }

        waitForPath();

        document.addEventListener("keydown", function(e) {
          if (e.key === "Escape") {
            if (window.__TAURI__) {
              window.__TAURI__.window.getCurrentWindow().close();
            }
          }
        });

        document.addEventListener("mousedown", function(e) {
          if (!ready) return;
          dragging = true;
          sx = e.clientX; sy = e.clientY;
          hint.style.display = "none";
          sel.style.display = "block";
          sz.style.display = "block";
          upd(e.clientX, e.clientY);
        });

        document.addEventListener("mousemove", function(e) {
          if (dragging) upd(e.clientX, e.clientY);
        });

        document.addEventListener("mouseup", function(e) {
          if (!dragging) return;
          dragging = false;
          var r = rect(e.clientX, e.clientY);

          if (r.w < 50 || r.h < 30) {
            hint.style.display = "block";
            hint.innerHTML = "範圍太小，請重新拖拉<small>按 ESC 取消</small>";
            sel.style.display = "none";
            sz.style.display = "none";
            return;
          }

          if (window.__TAURI__) {
            window.__TAURI__.core.invoke("capture_region", {
              x: r.x, y: r.y, width: r.w, height: r.h
            }).then(function() {
              window.__TAURI__.window.getCurrentWindow().close();
            }).catch(function(err) {
              hint.style.display = "block";
              hint.innerHTML = "擷取失敗：" + err + "<small>按 ESC 取消</small>";
              sel.style.display = "none";
            });
          }
        });

        function rect(cx, cy) {
          return {
            x: Math.min(sx, cx), y: Math.min(sy, cy),
            w: Math.abs(cx - sx), h: Math.abs(cy - sy)
          };
        }

        function upd(cx, cy) {
          var r = rect(cx, cy);
          sel.style.left = r.x + "px";
          sel.style.top = r.y + "px";
          sel.style.width = r.w + "px";
          sel.style.height = r.h + "px";
          sz.style.left = (r.x + r.w + 6) + "px";
          sz.style.top = (r.y + r.h + 6) + "px";
          sz.textContent = r.w + " x " + r.h;
        }
      })();
    </script>
  </body>
</html>
