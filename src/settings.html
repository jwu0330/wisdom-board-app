<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WisdomBoard</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body { font-family:"Segoe UI","Microsoft JhengHei",sans-serif; background:#fff; color:#111; font-size:13px; min-height:100vh; }

      .top { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid #ddd; }
      .top h1 { font-size:14px; font-weight:700; letter-spacing:0.5px; }
      .top .acts { display:flex; gap:2px; }
      .top .acts button { background:none; border:1px solid #ddd; color:#666; font-size:11px; cursor:pointer; padding:4px 10px; }
      .top .acts button:hover { background:#f5f5f5; color:#111; }

      .body { padding:12px 16px; }

      /* 設定列：快捷鍵 + 自啟動同一行 */
      .config-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding:8px 10px; border:1px solid #eee; background:#fafafa; flex-wrap:wrap; }
      .config-row .label { font-size:11px; color:#666; white-space:nowrap; }
      .config-row input[type="text"] { width:120px; padding:4px 8px; border:1px solid #ddd; font-size:11px; font-family:inherit; background:#fff; text-align:center; cursor:pointer; outline:none; }
      .config-row input[type="text"]:focus { border-color:#111; background:#fffff0; }
      .config-row button { padding:3px 8px; border:1px solid #ddd; font-size:10px; cursor:pointer; font-family:inherit; background:#fff; }
      .config-row button:hover { background:#f5f5f5; }
      .config-row .btn-save { background:#111; color:#fff; border-color:#111; }
      .config-row .btn-save:hover { background:#333; }
      .config-row .sep { width:1px; height:20px; background:#ddd; margin:0 4px; }
      .config-row label { font-size:11px; color:#666; cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:3px; }
      .hotkey-msg { font-size:10px; color:#999; padding:0 10px 6px; }

      .add-btn { width:100%; padding:12px; border:1px dashed #ccc; background:none; color:#999; font-size:12px; cursor:pointer; font-family:inherit; margin-bottom:8px; }
      .add-btn:hover { border-color:#111; color:#111; }

      /* 面板列表 — 表格式 */
      .list-head { display:flex; align-items:center; padding:6px 12px; border:1px solid #ddd; border-bottom:none; background:#f5f5f5; font-size:11px; color:#666; }
      .list-head label { display:flex; align-items:center; gap:4px; cursor:pointer; font-size:11px; }
      .list-head .spacer { flex:1; }

      .card { border:1px solid #ddd; border-top:none; }
      .card:first-child { border-top:1px solid #ddd; }
      .card.editing { background:#111; color:#fff; }
      .card.editing .card-url { color:rgba(255,255,255,0.5); }
      .card.editing .tag { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.7); }
      .card.editing .x:hover { color:#f66; }
      .card.editing .pill { background:transparent; color:rgba(255,255,255,0.6); border-color:rgba(255,255,255,0.3); }
      .card.editing .pill.on { background:#fff; color:#111; border-color:#fff; }
      .card.editing .pill:hover { border-color:#fff; color:#fff; }
      .card.editing .zoom-row span { color:rgba(255,255,255,0.5); }
      .card.editing .zoom-row .val { color:rgba(255,255,255,0.7); }

      .card-row { display:flex; align-items:center; padding:8px 12px; gap:8px; }
      .card-row .cb { margin-right:2px; }
      .card-row .info { flex:1; min-width:0; }
      .card-row .name { font-weight:600; font-size:12px; }
      .card-row .tag { font-size:9px; padding:1px 6px; border:1px solid #ccc; margin-left:6px; }
      .card-url { font-size:10px; color:#999; word-break:break-all; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .card-row .x { background:none; border:none; color:#999; cursor:pointer; font-size:12px; }
      .card-row .x:hover { color:#e00; }

      .card-ctrl { display:flex; align-items:center; gap:6px; padding:4px 12px 8px 32px; }
      .pills { display:flex; gap:2px; }
      .pill { padding:2px 8px; border:1px solid #ddd; font-size:10px; cursor:pointer; background:#fff; color:#666; font-family:inherit; }
      .pill:hover { border-color:#111; color:#111; }
      .pill.on { background:#111; color:#fff; border-color:#111; }
      .zoom-row { display:flex; align-items:center; gap:4px; flex:1; }
      .zoom-row span { font-size:10px; color:#999; }
      .zoom-row input { flex:1; max-width:120px; }
      .zoom-row .val { font-size:10px; min-width:30px; text-align:right; color:#666; }

      .empty { text-align:center; padding:30px; color:#ccc; font-size:12px; border:1px solid #ddd; }

      .ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:100; align-items:center; justify-content:center; }
      .ov.show { display:flex; }
      .dlg { background:#fff; border:1px solid #ddd; width:320px; }
      .dlg-h { padding:10px 14px; border-bottom:1px solid #eee; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
      .dlg-h button { background:none; border:none; color:#999; cursor:pointer; }
      .dlg-b { padding:14px; }
      .opt { padding:10px; border:1px solid #eee; margin-bottom:6px; cursor:pointer; }
      .opt:hover { border-color:#111; }
      .opt b { font-size:12px; display:block; margin-bottom:2px; }
      .opt small { font-size:10px; color:#999; }
      .url-area { display:none; margin-top:10px; }
      .url-area.show { display:block; }
      .url-area input { width:100%; padding:8px 10px; border:1px solid #ddd; font-size:12px; font-family:inherit; outline:none; }
      .url-area input:focus { border-color:#111; }
      .url-area .row { display:flex; gap:6px; margin-top:8px; }
      .btn { padding:6px 14px; border:1px solid #ddd; font-size:11px; cursor:pointer; font-family:inherit; background:#fff; }
      .btn-p { background:#111; color:#fff; border-color:#111; }
      .btn-p:hover { background:#333; }
      .btn-p:disabled { opacity:0.3; }
      .err { display:none; margin-top:6px; padding:6px 10px; border:1px solid #e00; font-size:11px; color:#e00; }
      .err.show { display:block; }

      .foot { position:fixed; bottom:0; left:0; right:0; padding:5px 16px; border-top:1px solid #eee; font-size:10px; color:#999; display:flex; justify-content:space-between; background:#fff; }
    </style>
  </head>
  <body>
    <div class="top">
      <h1>WISDOMBOARD</h1>
      <div class="acts">
        <button id="btn-close-all" title="關閉全部面板">全部關閉</button>
      </div>
    </div>

    <div class="body">
      <!-- 快捷鍵 + 自啟動：同一列 -->
      <div class="config-row">
        <span class="label">框選快捷鍵</span>
        <input type="text" id="hotkey-input" readonly placeholder="按下快捷鍵..." title="點擊後按下新的快捷鍵組合" />
        <button class="btn-save" id="hotkey-save">儲存</button>
        <button id="hotkey-reset">重設</button>
        <div class="sep"></div>
        <label><input type="checkbox" id="autostart-toggle" /> 開機自啟</label>
      </div>
      <div class="hotkey-msg" id="hotkey-msg"></div>

      <button class="add-btn" id="btn-add">+ 新增面板</button>

      <!-- 全選表頭 + 面板列表 -->
      <div id="list-container">
        <div class="list-head" id="list-head" style="display:none;">
          <label><input type="checkbox" id="cb-all" /> 全選編輯</label>
          <span class="spacer"></span>
        </div>
        <div id="list"><div class="empty">尚未建立面板</div></div>
      </div>
    </div>

    <div class="ov" id="dlg">
      <div class="dlg">
        <div class="dlg-h"><span>新增面板</span><button id="dlg-x">&#x2715;</button></div>
        <div class="dlg-b">
          <div class="opt" id="opt-url"><b>貼上網址</b><small>輸入 URL 顯示在面板中</small></div>
          <div class="opt" id="opt-cap"><b>框選螢幕區域</b><small>拖拉滑鼠框選要擷取的螢幕區域</small></div>
          <div class="url-area" id="url-area">
            <input id="url-in" placeholder="https://example.com" />
            <div class="err" id="url-err"></div>
            <div class="row">
              <button class="btn btn-p" id="url-ok" disabled>建立</button>
              <button class="btn" id="url-no">取消</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <span id="st">就緒</span>
      <span id="ct">面板：0</span>
    </div>

    <script type="module">
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const { getCurrentWindow } = window.__TAURI__.window;

      let panels = [];
      const listEl = document.getElementById("list");
      const listHead = document.getElementById("list-head");
      const cbAll = document.getElementById("cb-all");
      const dlg = document.getElementById("dlg");
      const urlArea = document.getElementById("url-area");
      const urlIn = document.getElementById("url-in");
      const urlErr = document.getElementById("url-err");
      const urlOk = document.getElementById("url-ok");

      function esc(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // === 快捷鍵設定 ===
      const hotkeyInput = document.getElementById("hotkey-input");
      const hotkeyMsg = document.getElementById("hotkey-msg");
      let pendingHotkey = null;

      async function loadHotkey() {
        try {
          const cfg = await invoke("get_hotkey_config");
          hotkeyInput.value = cfg.display_name;
          pendingHotkey = null;
        } catch (e) {
          hotkeyInput.value = "Ctrl+Alt+S";
        }
      }

      hotkeyInput.addEventListener("focus", () => {
        hotkeyInput.value = "請按下快捷鍵...";
        hotkeyMsg.textContent = "按住修飾鍵（Ctrl/Alt/Shift）再按一個字母或數字鍵";
      });

      hotkeyInput.addEventListener("blur", () => {
        if (!pendingHotkey) loadHotkey();
        hotkeyMsg.textContent = "";
      });

      hotkeyInput.addEventListener("keydown", (e) => {
        e.preventDefault();
        if (["Control","Alt","Shift","Meta"].includes(e.key)) return;

        let mods = 0;
        const parts = [];
        if (e.altKey)   { mods |= 0x0001; parts.push("Alt"); }
        if (e.ctrlKey)  { mods |= 0x0002; parts.push("Ctrl"); }
        if (e.shiftKey) { mods |= 0x0004; parts.push("Shift"); }

        if (mods === 0) {
          hotkeyMsg.textContent = "請至少搭配一個修飾鍵（Ctrl/Alt/Shift）";
          return;
        }

        const KEY_MAP = {
          'F1':112,'F2':113,'F3':114,'F4':115,'F5':116,'F6':117,
          'F7':118,'F8':119,'F9':120,'F10':121,'F11':122,'F12':123,
          'ArrowLeft':37,'ArrowRight':39,'ArrowUp':38,'ArrowDown':40,
          'Home':36,'End':35,'PageUp':33,'PageDown':34,
          'Insert':45,'Delete':46,'Escape':27,'Tab':9,
          'Enter':13,'Space':32,'Backspace':8,
        };
        const vk = KEY_MAP[e.key] || e.keyCode;
        if (!vk || vk === 229) {
          hotkeyMsg.textContent = "無法辨識此按鍵，請換一個";
          return;
        }
        const keyName = e.key.length === 1 ? e.key.toUpperCase() : e.key;
        parts.push(keyName);
        const displayName = parts.join("+");

        hotkeyInput.value = displayName;
        pendingHotkey = { modifiers: mods, vk, display_name: displayName };
        hotkeyMsg.textContent = "按「儲存」套用新快捷鍵";
      });

      document.getElementById("hotkey-save").onclick = async () => {
        if (!pendingHotkey) { hotkeyMsg.textContent = "尚未設定新快捷鍵"; return; }
        try {
          await invoke("set_hotkey", {
            modifiers: pendingHotkey.modifiers,
            vk: pendingHotkey.vk,
            displayName: pendingHotkey.display_name
          });
          hotkeyMsg.textContent = "快捷鍵已更新為 " + pendingHotkey.display_name;
          pendingHotkey = null;
        } catch (e) {
          hotkeyMsg.textContent = "設定失敗：" + e;
        }
      };

      document.getElementById("hotkey-reset").onclick = async () => {
        try {
          await invoke("set_hotkey", { modifiers: 0x0001|0x0002, vk: 0x53, displayName: "Ctrl+Alt+S" });
          hotkeyInput.value = "Ctrl+Alt+S";
          pendingHotkey = null;
          hotkeyMsg.textContent = "已重設為 Ctrl+Alt+S";
        } catch (e) {
          hotkeyMsg.textContent = "重設失敗：" + e;
        }
      };

      loadHotkey();

      // === autostart ===
      async function loadAutostart() {
        try {
          const enabled = await invoke("get_autostart");
          document.getElementById("autostart-toggle").checked = enabled;
        } catch {}
      }
      document.getElementById("autostart-toggle").addEventListener("change", async (e) => {
        try {
          await invoke("set_autostart", { enabled: e.target.checked });
        } catch (err) {
          document.getElementById("st").textContent = "自啟動設定失敗：" + err;
        }
      });
      loadAutostart();

      // === 面板管理 ===
      document.getElementById("btn-add").onclick = () => { dlg.classList.add("show"); urlArea.classList.remove("show"); urlErr.classList.remove("show"); };
      document.getElementById("dlg-x").onclick = closeDlg;
      dlg.onclick = (e) => { if (e.target === dlg) closeDlg(); };
      function closeDlg() { dlg.classList.remove("show"); urlArea.classList.remove("show"); urlErr.classList.remove("show"); urlIn.value = ""; }

      document.getElementById("opt-url").onclick = () => { urlArea.classList.add("show"); urlIn.focus(); };
      function updateUrlOk() { urlOk.disabled = !urlIn.value.trim(); urlErr.classList.remove("show"); }
      urlIn.addEventListener("input", updateUrlOk);
      urlIn.addEventListener("paste", () => setTimeout(updateUrlOk, 0));
      urlOk.onclick = doCreateUrl;
      urlIn.onkeydown = (e) => { if (e.key === "Enter" && urlIn.value.trim()) doCreateUrl(); };
      document.getElementById("url-no").onclick = () => { urlArea.classList.remove("show"); urlIn.value = ""; };

      let isSliding = false;
      let creatingUrl = false;
      async function doCreateUrl() {
        if (creatingUrl) return;
        let url = urlIn.value.trim();
        if (!url) return;
        if (!/^https?:\/\//i.test(url)) url = "https://" + url;
        try { new URL(url); } catch { urlErr.textContent = "網址格式不正確"; urlErr.classList.add("show"); return; }
        creatingUrl = true;
        try {
          const label = await invoke("create_url_panel", { url });
          panels.push({ label, url, type: "url", mode: "locked", editing: false, passthrough: false, zoom: 1.0 });
          render(); closeDlg();
        } catch (e) { urlErr.textContent = "建立失敗：" + e; urlErr.classList.add("show"); }
        finally { creatingUrl = false; }
      }

      document.getElementById("opt-cap").onclick = async () => {
        closeDlg();
        try { await invoke("open_capture_overlay"); } catch (e) { alert("建立失敗：" + e); }
      };

      // 全部關閉（不關閉設定視窗）
      document.getElementById("btn-close-all").onclick = async () => {
        try {
          await invoke("close_all_panels");
          panels = []; render();
        } catch (e) {
          document.getElementById("st").textContent = "關閉失敗：" + e;
        }
      };

      // 全選編輯 checkbox
      cbAll.addEventListener("change", async () => {
        const mode = cbAll.checked ? "edit" : "locked";
        try { await invoke("set_mode", { mode }); } catch(e) { console.warn(e); }
        for (const p of panels) {
          p.editing = cbAll.checked;
          p.passthrough = false;
          p.mode = mode;
        }
        render();
      });

      function render() {
        document.getElementById("ct").textContent = "面板：" + panels.length;
        if (isSliding) return;

        listHead.style.display = panels.length ? "" : "none";

        if (!panels.length) { listEl.innerHTML = '<div class="empty">尚未建立面板</div>'; return; }

        // 更新全選 checkbox 狀態
        const allEditing = panels.every(p => p.editing);
        const someEditing = panels.some(p => p.editing);
        cbAll.checked = allEditing;
        cbAll.indeterminate = someEditing && !allEditing;

        listEl.innerHTML = panels.map((p, i) => {
          const isUrl = p.type === 'url';
          const editing = p.editing || false;
          const passthrough = p.passthrough || false;
          return `
          <div class="card ${editing ? 'editing' : ''}" data-label="${esc(p.label)}">
            <div class="card-row">
              <input type="checkbox" class="cb" data-action="check" ${editing ? 'checked' : ''} />
              <div class="info">
                <span class="name">面板 ${i+1}</span><span class="tag">${isUrl?'URL':'擷取'}</span>
                ${p.url ? '<div class="card-url" title="'+esc(p.url)+'">'+esc(p.url)+'</div>' : ''}
              </div>
              <button class="x" data-action="close">&#x2715;</button>
            </div>
            <div class="card-ctrl">
              <div class="pills">
                <button class="pill ${editing?'on':''}" data-action="toggle" data-flag="editing">編輯</button>
                <button class="pill ${passthrough?'on':''}" data-action="toggle" data-flag="passthrough">穿透</button>
              </div>
              <div class="zoom-row">
                <span>縮放</span>
                <input type="range" min="10" max="200" value="${Math.round(p.zoom*100)}" data-action="zoom" />
                <span class="val" id="zv-${i}">${Math.round(p.zoom*100)}%</span>
              </div>
            </div>
          </div>`;
        }).join("");
      }

      // Event delegation
      listEl.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const card = btn.closest("[data-label]");
        if (!card) return;
        const label = card.dataset.label;
        const action = btn.dataset.action;

        if (action === "close") {
          try {
            await invoke("close_panel", { label });
            panels = panels.filter(p => p.label !== label);
            render();
          } catch (e) {
            alert("關閉失敗: " + e);
          }
        } else if (action === "toggle") {
          const flag = btn.dataset.flag;
          const p = panels.find(x => x.label === label);
          if (!p) return;
          const newVal = !p[flag];
          p.editing = false;
          p.passthrough = false;
          if (newVal) p[flag] = true;
          const mode = p.editing ? "edit" : (p.passthrough ? "passthrough" : "locked");
          p.mode = mode;
          try { await invoke("set_panel_mode", { label, mode }); } catch(e) { console.error(e); }
          render();
        }
      });

      // checkbox 直接切換編輯模式
      listEl.addEventListener("change", async (e) => {
        if (e.target.dataset.action !== "check") return;
        const card = e.target.closest("[data-label]");
        if (!card) return;
        const label = card.dataset.label;
        const p = panels.find(x => x.label === label);
        if (!p) return;
        const checked = e.target.checked;
        p.editing = checked;
        p.passthrough = false;
        p.mode = checked ? "edit" : "locked";
        try { await invoke("set_panel_mode", { label, mode: p.mode }); } catch(e) { console.error(e); }
        render();
      });

      // slider 拖曳狀態追蹤
      listEl.addEventListener("mousedown", (e) => {
        if (e.target.matches('[data-action="zoom"]')) isSliding = true;
      });
      document.addEventListener("mouseup", () => {
        if (isSliding) { isSliding = false; render(); }
      });

      listEl.addEventListener("input", async (e) => {
        const input = e.target;
        if (input.dataset.action !== "zoom") return;
        const card = input.closest("[data-label]");
        if (!card) return;
        const label = card.dataset.label;
        const v = parseInt(input.value);
        const z = v / 100;
        const p = panels.find(x => x.label === label);
        if (p) p.zoom = z;
        const idx = panels.findIndex(x => x.label === label);
        const el = document.getElementById("zv-" + idx);
        if (el) el.textContent = v + "%";
        try { await invoke("set_panel_zoom", { label, zoom: z }); } catch(e) {
          console.error("[settings] set_panel_zoom 失敗:", label, e);
        }
      });

      const unlisteners = [];
      unlisteners.push(listen("panel-closed", (e) => { panels=panels.filter(p=>p.label!==e.payload); render(); }));
      unlisteners.push(listen("panel-create-failed", (e) => {
        const label = e.payload;
        panels = panels.filter(p => p.label !== label);
        render();
        document.getElementById("st").textContent = "面板建立失敗";
      }));
      unlisteners.push(listen("panel-created", async (e) => {
        const d = e.payload;
        const label = typeof d === "string" ? d : d.label;
        const type = (typeof d === "object" && d.type) ? d.type : "capture";
        const url = (typeof d === "object" && d.url) ? d.url : null;
        const mode = (typeof d === "object" && d.mode) ? d.mode : "locked";
        const zoom = (typeof d === "object" && typeof d.zoom === "number") ? d.zoom : 1.0;
        if (label && !panels.find(p => p.label === label)) {
          panels.push({ label, url, type, mode, editing: mode === "edit", passthrough: mode === "passthrough", zoom });
        }
        render();
        await getCurrentWindow().show();
        await getCurrentWindow().setFocus();
      }));

      // 視窗關閉時清理所有 listener（防止累積）
      window.addEventListener("beforeunload", () => {
        unlisteners.forEach(async (p) => { try { (await p)(); } catch {} });
      });

      async function syncPanels() {
        try {
          const existing = await invoke("list_panels");
          for (const p of existing) {
            const found = panels.find(x => x.label === p.label);
            if (found) {
              found.mode = p.mode ?? found.mode;
              found.editing = found.mode === "edit";
              found.passthrough = found.mode === "passthrough";
              found.zoom = (typeof p.zoom === "number") ? p.zoom : found.zoom;
              found.url = p.url ?? found.url;
            } else {
              const m = p.mode ?? "locked";
              panels.push({
                label: p.label, url: p.url ?? null, type: p.type ?? "capture",
                mode: m, zoom: (typeof p.zoom === "number") ? p.zoom : 1.0,
                editing: m === "edit", passthrough: m === "passthrough"
              });
            }
          }
          const existingLabels = new Set(existing.map(p => p.label));
          panels = panels.filter(p => existingLabels.has(p.label));
          render();
        } catch (e) {
          console.warn("[settings] list_panels 失敗:", e);
        }
      }
      syncPanels();
      render();

      // Debug: Ctrl+Click 標題
      document.querySelector(".top h1").addEventListener("click", async (e) => {
        if (!e.ctrlKey) return;
        document.getElementById("st").textContent = "執行 Debug 測試中...";
        try {
          const result = await invoke("run_debug_tests");
          alert("=== DEBUG REPORT ===\n\n" + result);
          document.getElementById("st").textContent = "Debug 完成";
        } catch (err) {
          alert("Debug 失敗: " + err);
          document.getElementById("st").textContent = "Debug 失敗: " + err;
        }
      });
    </script>
  </body>
</html>
